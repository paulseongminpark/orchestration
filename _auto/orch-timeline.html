<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Orchestration Evolution — v0 → v4</title>
<style>
:root {
  --bg: #07070f;
  --surface: #0e0e1c;
  --border: rgba(255,255,255,0.07);
  --text: #c0c0d8;
  --muted: #6060a0;
  --accent: #5B8CFF;
  --mono: 'SF Mono','Fira Code','Consolas',monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; }

/* ── Layout ── */
.page { max-width: 960px; margin: 0 auto; padding: 60px 30px 120px; }
header { margin-bottom: 60px; }
header h1 { font-size: 22px; color: #fff; font-weight: 600; margin-bottom: 6px; }
header p  { color: var(--muted); font-size: 11px; }

/* ── Metrics bar ── */
.metrics-row { display: flex; gap: 12px; margin-bottom: 60px; }
.metric-card {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px;
}
.metric-label { color: var(--muted); font-size: 10px; margin-bottom: 8px; letter-spacing: .06em; }
.sparkline { display: flex; align-items: flex-end; gap: 4px; height: 32px; margin-bottom: 8px; }
.bar {
  flex: 1; border-radius: 2px 2px 0 0;
  transition: opacity 0.2s;
  cursor: default;
  position: relative;
}
.bar:hover { opacity: 0.75 !important; }
.metric-current { font-size: 20px; color: #fff; font-weight: 700; }
.metric-delta { font-size: 10px; margin-left: 6px; }
.delta-up   { color: #4CAF7D; }
.delta-down { color: #FF6B9D; }

/* ── Timeline ── */
.timeline { position: relative; }
.timeline::before {
  content: '';
  position: absolute; left: 130px; top: 0; bottom: 0;
  width: 1px; background: var(--border);
}

.version-block { display: flex; gap: 0; margin-bottom: 2px; position: relative; }
.version-block:last-child { margin-bottom: 0; }

/* Left: version label */
.v-label {
  width: 130px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: flex-end;
  padding-right: 28px; padding-top: 18px;
}
.v-tag {
  font-size: 13px; font-weight: 700; color: #fff;
  padding: 3px 8px; border-radius: 5px;
  border: 1px solid var(--border);
}
.v-date { font-size: 9px; color: var(--muted); margin-top: 5px; }

/* Dot on line */
.v-dot {
  position: absolute; left: 122px; top: 22px;
  width: 17px; height: 17px; border-radius: 50%;
  border: 2px solid var(--bg); z-index: 1;
}

/* Right: card */
.v-card {
  flex: 1; margin-left: 42px; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  cursor: pointer; transition: border-color 0.2s;
}
.v-card:hover { border-color: rgba(255,255,255,0.16); }
.v-card.expanded .v-card-body { display: block; }

.v-card-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.v-card-title { font-size: 13px; color: #fff; font-weight: 600; }
.v-card-sub   { font-size: 10px; color: var(--muted); margin-top: 3px; }
.v-card-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.chip {
  font-size: 9px; padding: 3px 8px; border-radius: 10px;
  border: 1px solid; white-space: nowrap;
}

.v-card-body { display: none; padding: 0 20px 18px; border-top: 1px solid var(--border); margin-top: 0; }
.v-section { margin-top: 14px; }
.v-section-title { font-size: 9px; color: var(--muted); letter-spacing: .08em; margin-bottom: 8px; }
.v-items { display: flex; flex-wrap: wrap; gap: 5px; }
.v-item {
  font-size: 10px; padding: 3px 9px; border-radius: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: #a0a0c8;
}
.v-principle {
  margin-top: 14px; padding: 12px 14px;
  background: rgba(255,255,255,0.02); border-left: 2px solid;
  border-radius: 0 6px 6px 0; font-size: 11px; color: #a0a0c8;
  font-style: italic;
}
.toggle-icon { font-size: 11px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; margin-left: 12px; }
.expanded .toggle-icon { transform: rotate(180deg); }

/* ── Stat deltas table ── */
.delta-table { margin-top: 60px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.delta-table table { width: 100%; border-collapse: collapse; }
.delta-table th { background: var(--surface); padding: 10px 16px; text-align: left; font-size: 10px; color: var(--muted); letter-spacing: .06em; font-weight: 600; }
.delta-table td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 11px; }
.delta-table td:first-child { color: #fff; font-weight: 600; }
.num-up   { color: #4CAF7D; }
.num-down { color: #FF6B9D; }
.num-same { color: var(--muted); }
</style>
</head>
<body>
<div class="page">

<header>
  <h1>Orchestration Evolution</h1>

<!-- ── Metrics Sparkline ────────────────────────────────────────── -->

    </div>

    <div style="height:32px; display:flex; align-items:center;">

        2026-02-21<br>→ 2026-02-27

    <div>
      <span class="metric-current">6</span>

  </div>
</div>

<!-- ── Timeline ───────────────────────────────────────────────── -->
<div class="timeline" id="timeline"></div>

<!-- ── Delta Table ─────────────────────────────────────────────── -->
<div class="delta-table" style="margin-top:48px;">
  <table>
    <thead>

  </table>
</div>

</div><!-- /page -->

<script>

    ],

// ── Spark lines ──────────────────────────────────────────────────────────────
function drawSpark(id, data, color) {
  const el = document.getElementById(id);
  const max = Math.max(...data);
  data.forEach((val, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const pct = max > 0 ? (val / max) * 100 : 5;
    bar.style.cssText = `height:${pct}%; background:${color}; opacity:${0.3 + (i/(data.length-1))*0.7}`;
    bar.title = `${VERSIONS[i].v}: ${val}`;
    el.appendChild(bar);
  });
}
drawSpark('spark-agents', VERSIONS.map(v=>v.agents), '#4F7FFF');
drawSpark('spark-skills',  VERSIONS.map(v=>v.skills),  '#3DBE7A');
drawSpark('spark-hooks',   VERSIONS.map(v=>v.hooks),   '#FF9A3C');

// ── Timeline ─────────────────────────────────────────────────────────────────
const tl = document.getElementById('timeline');
VERSIONS.forEach((ver, i) => {
  const block = document.createElement('div');
  block.className = 'version-block';

  // Dot
  const dot = document.createElement('div');
  dot.className = 'v-dot';
  dot.style.background = ver.color;
  dot.style.boxShadow = `0 0 8px ${ver.color}88`;

  // Label
  const label = document.createElement('div');
  label.className = 'v-label';
  label.innerHTML = `<div class="v-tag" style="color:${ver.color};border-color:${ver.color}44">${ver.v}</div><div class="v-date">${ver.date}</div>`;

  // Card
  const card = document.createElement('div');
  card.className = 'v-card';

  const chipsHtml = ver.chips.map(c =>
    `<span class="chip" style="color:${c.color};border-color:${c.color}44;background:${c.color}11">${c.label}</span>`
  ).join('');

  const sectionsHtml = ver.changes.map(ch => `
    <div class="v-section">
      <div class="v-section-title">${ch.section}</div>
      <div class="v-items">${ch.items.map(it => `<span class="v-item">${it}</span>`).join('')}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="v-card-header">
      <div>
        <div class="v-card-title">${ver.title}</div>
        <div class="v-card-sub">${ver.sub}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="v-card-chips">${chipsHtml}</div>
        <div class="toggle-icon">▾</div>
      </div>
    </div>
    <div class="v-card-body">
      ${sectionsHtml}
      <div class="v-principle" style="border-color:${ver.color}66;color:${ver.color}cc">
        "${ver.principle}"
      </div>
    </div>
  `;
  card.addEventListener('click', () => card.classList.toggle('expanded'));

  // Auto-expand last version
  if (i === VERSIONS.length - 1) card.classList.add('expanded');

  block.appendChild(label);
  block.appendChild(dot);
  block.appendChild(card);
  tl.appendChild(block);
});

// ── Delta Table ──────────────────────────────────────────────────────────────
const tbody = document.getElementById('delta-tbody');
VERSIONS.forEach((ver, i) => {
  const prev = VERSIONS[i-1];
  const dA = prev ? ver.agents - prev.agents : 0;
  const dS = prev ? ver.skills - prev.skills : 0;
  const dH = prev ? ver.hooks - prev.hooks : 0;
  const fmt = (n, v) => {
    if (!prev) return `<td class="num-same">${v}</td>`;
    const cls = n > 0 ? 'num-up' : n < 0 ? 'num-down' : 'num-same';
    const sign = n > 0 ? '+' : '';
    return `<td class="${cls}">${v} <span style="font-size:9px">(${sign}${n})</span></td>`;
  };
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:${ver.color}">${ver.v}</td>
    ${fmt(dA, ver.agents)}
    ${fmt(dS, ver.skills)}
    ${fmt(dH, ver.hooks)}
    <td style="color:var(--muted);font-size:10px">${ver.principle.slice(0,60)}…</td>
  `;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
